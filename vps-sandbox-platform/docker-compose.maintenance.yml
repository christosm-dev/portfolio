# =============================================================================
# Maintenance Mode Stack
# =============================================================================
# Lightweight stack that serves a "down for maintenance" page on all subdomains
# while keeping Let's Encrypt certificates renewed.
#
# Usage:
#   docker compose down
#   docker compose -f docker-compose.maintenance.yml up -d
#
# To restore:
#   docker compose -f docker-compose.maintenance.yml down
#   docker compose up -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Traefik - Reverse Proxy (minimal config for maintenance mode)
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:latest
    container_name: maintenance-traefik
    command:
      # Docker provider
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      # Entrypoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      # Let's Encrypt (keeps certs renewed during maintenance)
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.letsencrypt.acme.email=laptop-yodel-chilli@duck.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53"
      # Logging
      - "--log.level=WARN"
    environment:
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
      - DOCKER_API_VERSION=1.45
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt-data:/letsencrypt
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Maintenance Page - Static HTML served by nginx
  # ---------------------------------------------------------------------------
  maintenance-page:
    image: nginx:alpine
    container_name: maintenance-page
    volumes:
      - ./maintenance/index.html:/usr/share/nginx/html/index.html:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.maintenance.rule=HostRegexp(`.+`)"
      - "traefik.http.routers.maintenance.entrypoints=websecure"
      - "traefik.http.routers.maintenance.tls.certresolver=letsencrypt"
      - "traefik.http.routers.maintenance.priority=1"
      - "traefik.http.services.maintenance.loadbalancer.server.port=80"
    restart: unless-stopped

# =============================================================================
# Volumes (shared with main stack via same project name)
# =============================================================================
volumes:
  letsencrypt-data:

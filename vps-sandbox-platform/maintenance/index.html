<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>christosm.dev - Maintenance</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f8f9fa;
            --text: #1a1a2e;
            --muted: #6c757d;
            --accent: #0d6efd;
            --card-bg: #ffffff;
            --border: #dee2e6;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f1117;
                --text: #e2e8f0;
                --muted: #94a3b8;
                --accent: #60a5fa;
                --card-bg: #1e2028;
                --border: #2d3748;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .container {
            text-align: center;
            max-width: 520px;
        }

        .icon {
            font-size: 3rem;
            margin-bottom: 1.5rem;
            opacity: 0.8;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .site-name {
            color: var(--accent);
        }

        .message {
            color: var(--muted);
            font-size: 1.05rem;
            line-height: 1.6;
            margin-top: 1rem;
        }

        .divider {
            width: 60px;
            height: 2px;
            background: var(--border);
            margin: 1.5rem auto;
        }

        .footer {
            color: var(--muted);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">&#128736;</div>
        <h1>Down for Maintenance</h1>
        <p class="message">
            <span class="site-name">christosm.dev</span> services are currently
            offline for scheduled maintenance. We'll be back shortly.
        </p>
        <div class="divider"></div>
        <p class="footer">If you have any questions, please reach out via GitHub.</p>
    </div>
</body>
</html>

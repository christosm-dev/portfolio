# Grafana Dashboards Provisioning
# ================================

apiVersion: 1

providers:
  - name: 'VPS Sandbox Platform'
    orgId: 1
    folder: 'VPS Sandbox'
    folderUid: 'vps-sandbox'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards

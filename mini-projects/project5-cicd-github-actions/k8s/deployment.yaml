apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-tasks
  labels:
    app: flask-tasks
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-tasks
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: flask-tasks
    spec:
      containers:
        - name: flask-tasks
          # Image built locally into Minikube's docker daemon for CI.
          # For a real cluster, replace with the GHCR image:
          #   ghcr.io/christosm-dev/flask-tasks:latest
          image: flask-tasks:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20

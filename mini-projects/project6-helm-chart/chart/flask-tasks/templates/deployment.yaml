apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "flask-tasks.fullname" . }}
  labels:
    {{- include "flask-tasks.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  # When HPA is enabled it owns replica count — omit the field so they don't conflict.
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "flask-tasks.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "flask-tasks.selectorLabels" . | nindent 8 }}
      annotations:
        # Force a rolling restart when the ConfigMap content changes.
        # Kubernetes does not restart pods automatically on ConfigMap updates.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      containers:
        - name: flask-tasks
          image: {{ include "flask-tasks.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "flask-tasks.fullname" . }}-config
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

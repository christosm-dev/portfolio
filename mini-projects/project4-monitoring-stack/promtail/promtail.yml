# Promtail configuration — scrapes Docker container logs via the Docker socket
# and ships them to Loki. Labels are extracted from Docker container metadata
# so logs can be filtered by service name in Grafana.

server:
  http_listen_port: 9080
  grpc_listen_port: 0

# Tracks the last-read position in each log file across restarts.
positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          # Only scrape containers that are part of the monitoring Compose project.
          # Remove this filter to scrape all containers on the host.
          - name: label
            values: ["com.docker.compose.project=project4-monitoring-stack"]

    relabel_configs:
      # Use the container name (without leading slash) as the `container` label
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: container

      # Expose the Compose service name as the `service` label — this is what
      # the Grafana logs panel queries with {service="app"}
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service

      # Tag which log stream (stdout / stderr) the line came from
      - source_labels: [__meta_docker_container_log_stream]
        target_label: logstream

      # Preserve the container image name for filtering
      - source_labels: [__meta_docker_container_label_com_docker_compose_image]
        target_label: image
